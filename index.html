<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>영양제 알람</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="영양제 알람">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0d9488">
<style>
  :root{
    --teal:#0d9488; --teal-dark:#0f766e; --teal-bg:#f0fdfa;
    --ink:#1f2937; --sub:#6b7280; --line:#e5e7eb;
    --bg:#f8fafc; --card:#ffffff;
    --red:#dc2626; --red-bg:#fef2f2;
    --amber:#d97706; --amber-bg:#fffbeb;
    --green:#16a34a; --green-bg:#f0fdf4;
    --blue:#2563eb; --blue-bg:#eff6ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--ink); font-size:16px; line-height:1.5;
    padding-bottom:calc(76px + env(safe-area-inset-bottom));
  }
  header{
    background:var(--teal); color:#fff; padding:14px 20px;
    padding-top:calc(14px + env(safe-area-inset-top));
    position:sticky; top:0; z-index:10;
  }
  header h1{font-size:19px; font-weight:700}
  header .date{font-size:13px; opacity:.9}
  main{padding:16px; max-width:520px; margin:0 auto}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px}
  .card h2{font-size:16px; margin-bottom:10px}
  .muted{color:var(--sub); font-size:13px}
  .small{font-size:13px}
  button{font-family:inherit; font-size:15px; border:none; border-radius:10px; cursor:pointer}
  .btn{display:block; width:100%; padding:13px; background:var(--teal); color:#fff; font-weight:600; margin-top:10px}
  .btn:active{background:var(--teal-dark)}
  .btn.gray{background:#e5e7eb; color:var(--ink)}
  .btn.outline{background:#fff; color:var(--teal); border:1.5px solid var(--teal)}
  .btn.danger{background:#fff; color:var(--red); border:1.5px solid #fecaca}
  .btn.sm{display:inline-block; width:auto; padding:8px 14px; font-size:14px; margin:0}
  /* ---- bottom tabs ---- */
  nav{
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    background:#fff; border-top:1px solid var(--line);
    display:flex; padding-bottom:env(safe-area-inset-bottom);
  }
  nav button{flex:1; background:none; padding:9px 0 7px; color:var(--sub); font-size:11px; border-radius:0}
  nav button .ico{display:block; font-size:21px; margin-bottom:1px}
  nav button.on{color:var(--teal); font-weight:700}
  /* ---- today ---- */
  .progress-wrap{display:flex; align-items:center; gap:14px}
  .ring{width:64px; height:64px; flex-shrink:0}
  .dose{display:flex; align-items:center; gap:12px; padding:12px 4px; border-bottom:1px solid var(--line)}
  .dose:last-child{border-bottom:none}
  .dose .time-badge{
    background:var(--teal-bg); color:var(--teal-dark); font-weight:700; font-size:13px;
    border-radius:8px; padding:4px 8px; min-width:56px; text-align:center; flex-shrink:0;
  }
  .dose .name{flex:1; font-size:15px}
  .dose .name .memo{font-size:12px; color:var(--sub)}
  .chk{
    width:30px; height:30px; border-radius:50%; border:2px solid #d1d5db; background:#fff;
    flex-shrink:0; font-size:16px; color:#fff; line-height:1;
  }
  .chk.on{background:var(--teal); border-color:var(--teal)}
  .dose.done .name{color:var(--sub); text-decoration:line-through}
  .time-group-label{font-size:13px; font-weight:700; color:var(--sub); margin:14px 0 2px}
  /* ---- supplement list ---- */
  .supp-item{border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px; background:#fff}
  .supp-item .top{display:flex; justify-content:space-between; align-items:center; gap:8px}
  .supp-item .nm{font-weight:700; font-size:15px}
  .supp-item .times{color:var(--teal-dark); font-size:13px; font-weight:600}
  .supp-item .ings{font-size:12.5px; color:var(--sub); margin-top:4px}
  .icon-btn{background:#f3f4f6; border-radius:8px; padding:6px 10px; font-size:13px; color:var(--ink)}
  /* ---- form ---- */
  label.fld{display:block; font-size:13.5px; font-weight:600; margin:14px 0 5px}
  input[type=text], input[type=number], input[type=time], select{
    width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:10px;
    font-size:16px; font-family:inherit; background:#fff; color:var(--ink);
  }
  input:focus, select:focus{outline:none; border-color:var(--teal)}
  .row{display:flex; gap:8px; align-items:center}
  .row > *{min-width:0}
  .chip{
    display:inline-flex; align-items:center; gap:6px; background:var(--teal-bg); color:var(--teal-dark);
    border-radius:999px; padding:6px 12px; font-size:14px; font-weight:600; margin:4px 6px 0 0;
  }
  .chip b{cursor:pointer; font-weight:700}
  .ing-row{display:flex; gap:6px; margin-bottom:8px; align-items:center}
  .ing-row select{flex:1.5}
  .ing-row input{flex:1}
  .ing-row .unit{font-size:13px; color:var(--sub); width:34px; flex-shrink:0}
  .ing-row .del{background:none; color:#9ca3af; font-size:18px; padding:4px; flex-shrink:0}
  .sr-box{border:1.5px solid var(--line); border-radius:12px; margin-top:8px; max-height:280px; overflow-y:auto; background:#fff}
  .sr-item{padding:10px 14px; border-bottom:1px solid var(--line); font-size:14px; cursor:pointer; line-height:1.45}
  .sr-item:last-child{border-bottom:none}
  .sr-item:active{background:var(--teal-bg)}
  .advice{background:var(--blue-bg); border-radius:12px; padding:12px 14px; font-size:14px; margin-bottom:10px; color:#1e3a8a; line-height:1.55}
  .advice details{margin-top:4px}
  .advice summary{color:var(--blue); font-size:13.5px; padding:2px 0}
  .qt{
    display:inline-block; background:var(--teal-bg); color:var(--teal-dark); border:1.5px solid #99f6e4;
    border-radius:999px; padding:8px 13px; font-size:13.5px; font-weight:600; margin:0 6px 8px 0;
  }
  /* ---- analysis ---- */
  .nut-row{margin-bottom:12px}
  .nut-row .top{display:flex; justify-content:space-between; font-size:14px; margin-bottom:3px}
  .nut-row .top .val{color:var(--sub); font-size:13px}
  .bar{height:8px; background:#e5e7eb; border-radius:4px; overflow:hidden}
  .bar i{display:block; height:100%; border-radius:4px; background:var(--teal)}
  .bar i.warn{background:var(--amber)} .bar i.over{background:var(--red)}
  .tag{display:inline-block; font-size:11.5px; font-weight:700; border-radius:6px; padding:1px 7px; margin-left:6px; vertical-align:1px}
  .tag.ok{background:var(--green-bg); color:var(--green)}
  .tag.warn{background:var(--amber-bg); color:var(--amber)}
  .tag.over{background:var(--red-bg); color:var(--red)}
  .alert{border-radius:12px; padding:12px 14px; font-size:14px; margin-bottom:10px; line-height:1.55}
  .alert b{display:block; margin-bottom:2px}
  .alert.red{background:var(--red-bg); color:#991b1b}
  .alert.amber{background:var(--amber-bg); color:#92400e}
  .alert.green{background:var(--green-bg); color:#166534}
  .alert.blue{background:var(--blue-bg); color:#1e40af}
  /* ---- calendar ---- */
  .cal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
  .cal-head b{font-size:17px}
  .cal-head button{background:#f3f4f6; width:36px; height:36px; border-radius:10px; font-size:16px}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center}
  .cal-grid .wd{font-size:12px; color:var(--sub); font-weight:700; padding:4px 0}
  .cal-cell{
    aspect-ratio:1; border-radius:10px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; font-size:13.5px; background:#fff; border:1px solid transparent;
  }
  .cal-cell .dot{width:7px; height:7px; border-radius:50%; margin-top:2px}
  .cal-cell.today{border-color:var(--teal); font-weight:700; color:var(--teal-dark)}
  .cal-cell.sel{background:var(--teal); color:#fff}
  .cal-cell.sel .dot{outline:1.5px solid #fff}
  .legend{display:flex; gap:14px; margin-top:10px; font-size:12px; color:var(--sub); flex-wrap:wrap}
  .legend i{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:4px}
  /* ---- banner alarm ---- */
  #alarmBanner{
    position:fixed; top:0; left:0; right:0; z-index:100; display:none;
    background:var(--teal); color:#fff; padding:16px 20px;
    padding-top:calc(16px + env(safe-area-inset-top));
    box-shadow:0 4px 20px rgba(0,0,0,.25); font-size:15px;
  }
  #alarmBanner b{display:block; font-size:17px; margin-bottom:2px}
  /* ---- 사진 영역 선택 ---- */
  #cropOverlay{
    position:fixed; inset:0; background:rgba(0,0,0,.93); z-index:200; display:none;
    flex-direction:column; padding:14px;
    padding-top:calc(14px + env(safe-area-inset-top));
    padding-bottom:calc(14px + env(safe-area-inset-bottom));
  }
  #cropOverlay .crop-head{color:#fff; font-size:14.5px; text-align:center; margin-bottom:10px; line-height:1.5}
  #cropBox{flex:1; display:flex; align-items:center; justify-content:center; min-height:0}
  #cropCanvas{max-width:100%; max-height:100%; touch-action:none; border-radius:8px}
  .crop-btns .btn{margin-top:8px}
  .empty{
    text-align:center; padding:36px 16px; color:var(--sub); font-size:14px;
  }
  .empty .big{font-size:40px; margin-bottom:8px}
  details{margin-top:8px}
  summary{font-size:14px; font-weight:600; color:var(--teal-dark); cursor:pointer; padding:6px 0}
  details ol{padding-left:20px; font-size:14px}
  details li{margin-bottom:6px}
  .footer-note{font-size:12px; color:#9ca3af; text-align:center; padding:14px 20px 4px; line-height:1.6}
</style>
</head>
<body>

<div id="alarmBanner" onclick="hideBanner()"></div>
<div id="cropOverlay">
  <div class="crop-head">📷 <b>성분 표 부분만</b> 손가락으로 문질러서<br>네모로 선택해 주세요 (더 정확해져요)</div>
  <div id="cropBox"><canvas id="cropCanvas"></canvas></div>
  <div class="crop-btns">
    <button class="btn" onclick="cropConfirm(false)">✅ 선택한 부분 읽기</button>
    <button class="btn gray" onclick="cropConfirm(true)">선택 없이 사진 전체로 읽기</button>
    <button class="btn gray" onclick="closeCrop()">취소</button>
  </div>
</div>
<header>
  <h1>💊 영양제 알람</h1>
  <div class="date" id="headerDate"></div>
</header>
<main id="main"></main>
<nav id="nav">
  <button data-tab="today"><span class="ico">☀️</span>오늘</button>
  <button data-tab="supps"><span class="ico">💊</span>영양제</button>
  <button data-tab="analysis"><span class="ico">🔍</span>분석</button>
  <button data-tab="calendar"><span class="ico">📅</span>달력</button>
  <button data-tab="settings"><span class="ico">⚙️</span>설정</button>
</nav>

<script>
"use strict";
/* ================= 영양소 사전 =================
   기준: 2020 한국인 영양소 섭취기준(성인) + 식약처 건강기능식품 일일섭취량.
   rda = 하루 권장(충분) 섭취량, ul = 상한 섭취량(이 이상은 주의). null = 상한 미설정 */
const NUTRIENTS = {
  vitA:      {name:"비타민A",           unit:"㎍",  rda:750,  ul:3000, tip:"㎍ RAE 기준"},
  vitD:      {name:"비타민D",           unit:"㎍",  rda:15,   ul:100,  tip:"1000IU = 25㎍"},
  vitE:      {name:"비타민E",           unit:"㎎",  rda:12,   ul:540,  tip:"㎎ α-TE 기준"},
  vitK:      {name:"비타민K",           unit:"㎍",  rda:75,   ul:null},
  vitC:      {name:"비타민C",           unit:"㎎",  rda:100,  ul:2000},
  b1:        {name:"비타민B1(티아민)",   unit:"㎎",  rda:1.2,  ul:null},
  b2:        {name:"비타민B2(리보플라빈)",unit:"㎎", rda:1.5,  ul:null},
  niacin:    {name:"니아신(B3)",        unit:"㎎",  rda:16,   ul:35,   tip:"니코틴산 기준 상한 35㎎"},
  b6:        {name:"비타민B6",          unit:"㎎",  rda:1.5,  ul:100},
  folate:    {name:"엽산",              unit:"㎍",  rda:400,  ul:1000, tip:"보충제 기준 상한 1000㎍"},
  b12:       {name:"비타민B12",         unit:"㎍",  rda:2.4,  ul:null},
  biotin:    {name:"비오틴",            unit:"㎍",  rda:30,   ul:null},
  pantothenic:{name:"판토텐산(B5)",     unit:"㎎",  rda:5,    ul:null},
  calcium:   {name:"칼슘",              unit:"㎎",  rda:800,  ul:2500},
  magnesium: {name:"마그네슘",          unit:"㎎",  rda:350,  ul:350,  tip:"보충제 기준 상한 350㎎ (음식 제외)"},
  iron:      {name:"철분",              unit:"㎎",  rda:12,   ul:45},
  zinc:      {name:"아연",              unit:"㎎",  rda:10,   ul:35},
  copper:    {name:"구리",              unit:"㎍",  rda:850,  ul:10000},
  selenium:  {name:"셀레늄",            unit:"㎍",  rda:60,   ul:400},
  omega3:    {name:"오메가3(EPA+DHA)",  unit:"㎎",  rda:1000, ul:2000, tip:"식약처 일일섭취량 500~2000㎎"},
  lutein:    {name:"루테인",            unit:"㎎",  rda:20,   ul:20,   tip:"식약처 일일섭취량 10~20㎎"},
  coq10:     {name:"코엔자임Q10",       unit:"㎎",  rda:100,  ul:100,  tip:"식약처 일일섭취량 90~100㎎"},
  milkthistle:{name:"밀크씨슬(실리마린)",unit:"㎎", rda:130,  ul:130,  tip:"식약처 일일섭취량 130㎎"},
  probiotics:{name:"유산균(프로바이오틱스)",unit:"억",rda:1,   ul:null, tip:"억 CFU 단위"},
};

/* ================= 성분별 추천 복용 시간 ================= */
const TIMING = {
  vitA:"식사 직후 — 지용성이라 기름기 있는 식사와 함께 흡수가 잘돼요",
  vitD:"식사 직후 — 지용성. 아침·점심 식후가 무난해요",
  vitE:"식사 직후 — 지용성",
  vitK:"식사 직후 — 지용성",
  vitC:"아무 때나 — 속이 쓰리면 식후. 철분과 함께 먹으면 철분 흡수를 도와요",
  b1:"아침 식후 — B군은 에너지 대사를 도와요. 늦은 저녁엔 수면에 방해될 수 있어요",
  b2:"아침 식후 — B군은 에너지 대사를 도와요",
  niacin:"아침 식후 — B군. 고용량은 홍조가 생길 수 있어 식후 권장",
  b6:"아침 식후 — B군",
  folate:"아무 때나 — 규칙적으로만 드시면 돼요",
  b12:"아침 식후 — B군",
  biotin:"아침 식후 — B군",
  pantothenic:"아침 식후 — B군",
  calcium:"저녁 식후 — 한 번에 500㎎ 이하로. 철분과 2시간 이상 간격을 두세요",
  magnesium:"저녁 식후~자기 전 — 근육 이완과 수면에 도움을 줘요",
  iron:"아침 공복 — 흡수가 가장 좋아요. 속이 쓰리면 식후로. 커피·칼슘과 2시간 간격",
  zinc:"식후 — 공복엔 속이 메스꺼울 수 있어요. 고용량 철분·칼슘과는 시간 분리",
  copper:"식후 — 아연 고용량과 함께라면 균형 확인",
  selenium:"식후 — 아무 시간이나 괜찮아요",
  omega3:"식사 직후 — 기름기 있는 식사와 함께 먹으면 흡수가 늘어요",
  lutein:"식사 직후 — 지용성",
  coq10:"아침·점심 식후 — 지용성. 늦은 저녁엔 일부에서 잠을 설칠 수 있어요",
  milkthistle:"아무 때나 — 대개 식후로 안내돼요",
  probiotics:"아침 공복 또는 자기 전 — 위산이 적을 때 균이 더 많이 살아남아요",
};
const B_KEYS = ["b1","b2","b6","b12","niacin","biotin","pantothenic"];
const FAT_KEYS = ["vitA","vitD","vitE","vitK","omega3","lutein","coq10"];
function timingAdvice(keys){
  if(keys.length===0) return null;
  let txt;
  if(keys.includes("iron")) txt = "아침 공복 (커피·칼슘과 2시간 간격)";
  else if(keys.some(k=>B_KEYS.includes(k))) txt = "아침 식후";
  else if(keys.includes("magnesium") && !keys.includes("calcium")) txt = "저녁 식후 또는 자기 전";
  else if(keys.includes("calcium") || keys.includes("magnesium")) txt = "저녁 식후";
  else if(keys.includes("probiotics")) txt = "아침 공복 또는 자기 전";
  else if(keys.includes("zinc")) txt = "저녁 식후";
  else if(keys.some(k=>FAT_KEYS.includes(k))) txt = "식사 직후 (아침·점심 아무 때나)";
  else txt = "편한 시간에 규칙적으로";
  const details = keys.filter(k=>TIMING[k]).map(k=>({name:NUTRIENTS[k].name, tip:TIMING[k]}));
  return {txt, details};
}

/* ================= 조합 규칙 ================= */
const COMBO_RULES = [
  {a:"calcium", b:"iron", type:"bad",
   msg:"칼슘과 철분은 함께 먹으면 서로 흡수를 방해해요. 두 영양제는 2시간 이상 간격을 두고 드시는 게 좋아요. (예: 칼슘은 저녁, 철분은 아침)"},
  {a:"calcium", b:"zinc", type:"caution",
   msg:"고용량 칼슘은 아연 흡수를 낮출 수 있어요. 가능하면 시간을 나눠 드시면 더 좋아요."},
  {a:"iron", b:"zinc", type:"caution",
   msg:"철분과 아연은 흡수 경로가 겹쳐서 고용량을 동시에 먹으면 서로 흡수가 떨어질 수 있어요."},
  {a:"vitC", b:"iron", type:"good",
   msg:"비타민C는 철분 흡수를 도와줘요. 함께 드시면 좋은 조합이에요. 👍"},
  {a:"vitD", b:"calcium", type:"good",
   msg:"비타민D는 칼슘 흡수를 도와줘요. 함께 드시면 좋은 조합이에요. 👍"},
  {a:"vitD", b:"magnesium", type:"good",
   msg:"마그네슘은 비타민D가 몸에서 활성화되는 것을 도와줘요. 좋은 조합이에요. 👍"},
];

/* ================= 성별·나이별 맞춤 기준 (2020 한국인 영양소 섭취기준) =================
   값이 성별·연령대에 따라 다른 영양소만 조정. 나머지는 기본값 사용 */
const RDA_ADJ = {
  vitA:      {M:800, F:650},
  vitK:      {M:75,  F:65},
  b1:        {M:1.2, F:1.1},
  b2:        {M:1.5, F:1.2},
  niacin:    {M:16,  F:14},
  b6:        {M:1.5, F:1.4},
  zinc:      {M:10,  F:8},
  copper:    {M:850, F:650},
  magnesium: {M:365, F:280},
  iron:    (sex, age) => sex==="F" ? (age<50 ? 14 : 8) : 10,
  calcium: (sex, age) => sex==="M" ? (age<50 ? 800 : age<65 ? 750 : 700) : (age<50 ? 700 : 800),
  vitD:    (sex, age) => age>=65 ? 15 : 10,
};
const UL_ADJ = {
  calcium: (sex, age) => age>=50 ? 2000 : 2500, // 50세 이상은 칼슘 상한이 더 낮음
};
function getProfile(){
  const p = state.profile || {};
  if(!p.sex || !p.birth) return null;
  const age = new Date().getFullYear() - p.birth;
  return (age>=19 && age<=110) ? {sex:p.sex, age} : null;
}
function rdaOf(key){
  const n = NUTRIENTS[key], p = getProfile(), a = RDA_ADJ[key];
  if(!p || !a) return n.rda;
  return typeof a === "function" ? a(p.sex, p.age) : (a[p.sex] !== undefined ? a[p.sex] : n.rda);
}
function ulOf(key){
  const n = NUTRIENTS[key], p = getProfile(), a = UL_ADJ[key];
  if(!p || !a) return n.ul;
  return typeof a === "function" ? a(p.sex, p.age) : n.ul;
}

/* ================= 데이터 저장 ================= */
const STORE_KEY = "nutrialarm_v1";
let state = {supps:[], records:{}};
function load(){ try{ const s = localStorage.getItem(STORE_KEY); if(s) state = JSON.parse(s); }catch(e){} }
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function dateKey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function todayKey(){ return dateKey(new Date()); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtAmt(n){ return (Math.round(n*100)/100).toLocaleString("ko-KR"); }

/* ================= 오늘 탭 ================= */
function dosesForDay(){
  // [{suppId, name, memo, time}] 시간순
  const list = [];
  state.supps.forEach(s=> s.times.forEach(t=> list.push({suppId:s.id, name:s.name, memo:s.memo||"", time:t})));
  list.sort((a,b)=> a.time.localeCompare(b.time));
  return list;
}
function isChecked(dk, suppId, time){
  return !!(state.records[dk] && state.records[dk][suppId+"@"+time]);
}
function toggleDose(suppId, time){
  const dk = todayKey();
  if(!state.records[dk]) state.records[dk] = {};
  const k = suppId+"@"+time;
  if(state.records[dk][k]) delete state.records[dk][k];
  else state.records[dk][k] = Date.now();
  save(); render();
}
function viewToday(){
  const doses = dosesForDay();
  if(doses.length===0){
    return `<div class="card"><div class="empty"><div class="big">💊</div>
      아직 등록된 영양제가 없어요.<br>아래 <b>[영양제]</b> 탭에서 먼저 등록해 주세요.</div>
      <button class="btn" onclick="tab='supps';editingId='new';render()">+ 첫 영양제 등록하기</button></div>`;
  }
  const dk = todayKey();
  const done = doses.filter(d=>isChecked(dk,d.suppId,d.time)).length;
  const pct = Math.round(done/doses.length*100);
  const R=26, C=2*Math.PI*R;
  let html = `<div class="card"><div class="progress-wrap">
    <svg class="ring" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="${R}" fill="none" stroke="#e5e7eb" stroke-width="7"/>
      <circle cx="32" cy="32" r="${R}" fill="none" stroke="#0d9488" stroke-width="7" stroke-linecap="round"
        stroke-dasharray="${C}" stroke-dashoffset="${C*(1-done/doses.length)}" transform="rotate(-90 32 32)"/>
      <text x="32" y="37" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">${pct}%</text>
    </svg>
    <div><b style="font-size:17px">오늘 ${done} / ${doses.length}회 복용</b><br>
    <span class="muted">${pct===100 ? "오늘 복용 완료! 잘하셨어요 🎉" : "드신 뒤 오른쪽 동그라미를 눌러 체크하세요."}</span></div>
  </div></div>`;

  // 시간대별 그룹
  let curTime = null;
  html += `<div class="card">`;
  doses.forEach(d=>{
    if(d.time!==curTime){ curTime=d.time; }
    const chk = isChecked(dk,d.suppId,d.time);
    html += `<div class="dose ${chk?"done":""}">
      <span class="time-badge">${esc(d.time)}</span>
      <span class="name">${esc(d.name)}${d.memo?`<br><span class="memo">${esc(d.memo)}</span>`:""}</span>
      <button class="chk ${chk?"on":""}" onclick="toggleDose('${d.suppId}','${d.time}')" aria-label="복용 체크">${chk?"✓":""}</button>
    </div>`;
  });
  html += `</div>`;
  html += quickWarnCard();
  return html;
}
/* 오늘 탭 하단: 분석에서 심각한 경고만 요약 */
function quickWarnCard(){
  const {overs, badCombos} = analyze();
  if(overs.length===0 && badCombos.length===0) return "";
  let html = `<div class="alert red"><b>⚠️ 확인이 필요해요</b>`;
  overs.forEach(o=> html += `${esc(o.name)}이(가) 하루 상한을 넘어요 (${fmtAmt(o.total)}${o.unit} / 상한 ${fmtAmt(o.ul)}${o.unit}).<br>`);
  badCombos.forEach(c=> html += `${esc(c.short)}<br>`);
  html += `<span class="small">자세한 내용은 [분석] 탭에서 확인하세요.</span></div>`;
  return html;
}

/* ---- 식약처 등록 제품 검색 ---- */
let PRODUCT_DB = null, prodLoading = false, searchTimer = null;
function normTxt(s){ return String(s).toLowerCase().replace(/\s+/g, ""); }
async function loadProductDB(){
  if(PRODUCT_DB || prodLoading) return;
  prodLoading = true;
  try{
    const res = await fetch("products.json");
    if(res.ok) PRODUCT_DB = await res.json();
  }catch(e){}
  prodLoading = false;
}
function searchProducts(q){
  window._searchQ = q;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doProductSearch, 250);
}
async function doProductSearch(){
  const el = document.getElementById("searchResults");
  if(!el) return;
  const q = normTxt(window._searchQ || "");
  if(q.length < 2){ el.innerHTML = ""; return; }
  if(!PRODUCT_DB){
    el.innerHTML = '<div class="muted" style="padding:8px 2px">제품 목록을 불러오는 중… (처음 한 번만)</div>';
    await loadProductDB();
    if(!PRODUCT_DB){ el.innerHTML = '<div class="muted" style="padding:8px 2px">목록을 불러오지 못했어요. 인터넷 연결을 확인해 주세요.</div>'; return; }
    if(normTxt(window._searchQ||"") !== q) return; // 그새 검색어가 바뀜
  }
  const hits = [];
  for(const p of PRODUCT_DB){
    if(normTxt(p[0]).includes(q) || (p[1] && normTxt(p[1]).includes(q))){
      hits.push(p);
      if(hits.length >= 30) break;
    }
  }
  window._searchHits = hits;
  if(hits.length === 0){
    el.innerHTML = '<div class="muted" style="padding:8px 2px">검색 결과가 없어요. 📷 사진 인식이나 직접 입력을 이용해 보세요.</div>';
    return;
  }
  el.innerHTML = '<div class="sr-box">' + hits.map((p,i)=>`
    <div class="sr-item" onclick="pickSearched(${i})">
      <b>${esc(p[0])}</b> ${p[2] ? '<span class="tag ok">함량 자동</span>' : '<span class="tag warn">이름만</span>'}
      ${p[1] ? `<br><span style="font-size:12px;color:var(--sub)">${esc(p[1])}</span>` : ""}
    </div>`).join("") + "</div>";
}
function pickSearched(i){
  const p = (window._searchHits||[])[i];
  if(!p) return;
  window._tmpName = p[0];
  if(p[2]) formIngs = Object.entries(p[2]).map(([key,amount])=>({key, amount}));
  persistName(); render();
  setTimeout(()=>{
    const n = document.getElementById("fName"); if(n) n.value = p[0];
    ocrSetStatus(p[2]
      ? "✅ 식약처 등록 정보로 성분을 채웠어요. <b>라벨과 같은지 확인</b>해 주세요. (아연·마그네슘 등 일부 성분은 이 데이터에 없어 라벨 확인 필요)"
      : "이 제품은 식약처 데이터에 함량 숫자가 없어요. 라벨을 보고 입력하거나 📷 사진 인식을 이용해 주세요.");

function saveSupp(){
  persistName();
  const name = (document.getElementById("fName").value||"").trim();
  const memo = (document.getElementById("fMemo").value||"").trim();
  if(!name){ alert("제품 이름을 입력해 주세요."); return; }
  if(formTimes.length===0){ alert("복용 시간을 1개 이상 추가해 주세요."); return; }

    const s = state.supps.find(x=>x.id===editingId);
    Object.assign(s,{name, times:[...formTimes].sort(), ing, memo});

  editingId=null; save(); render();

/* ================= 분석 탭 ================= */
function analyze(){
  // 총합 계산
  const totals = {};
  state.supps.forEach(s=> Object.entries(s.ing||{}).forEach(([k,v])=>{ totals[k]=(totals[k]||0)+v; }));
  const rows = Object.entries(totals).map(([k,total])=>{
    const n = NUTRIENTS[k];
    const rda = rdaOf(k), ul = ulOf(k);
    let status = "ok";
    if(ul){
      if(total > ul) status = "over";
      else if(total >= ul*0.8) status = "warn";
    }
    return {key:k, name:n.name, unit:n.unit, total, rda, ul, tip:n.tip, status};
  });
  rows.sort((a,b)=> (b.status==="over")-(a.status==="over") || (b.status==="warn")-(a.status==="warn"));
  const overs = rows.filter(r=>r.status==="over");

  // 조합 분석
  const has = key => state.supps.filter(s=> s.ing && s.ing[key]>0);
  const goodCombos=[], badCombos=[], cautions=[];
  COMBO_RULES.forEach(rule=>{
    const A = has(rule.a), B = has(rule.b);
    if(A.length===0 || B.length===0) return;
    // 같은 제품 하나에만 함께 든 경우: 제조사가 배합한 것이므로 경고 수위 낮춤
    const separate = A.some(sa=> B.some(sb=> sa.id!==sb.id));
    // 같은 시간에 겹치는지
    let sameTime = false;
    A.forEach(sa=> B.forEach(sb=>{
      if(sa.id!==sb.id && sa.times.some(t=> sb.times.includes(t))) sameTime = true;
    }));
    const aName = NUTRIENTS[rule.a].name, bName = NUTRIENTS[rule.b].name;
    const item = {rule, aName, bName, sameTime,
      short:`${aName} + ${bName} 조합을 확인해 주세요.`};
    if(rule.type==="good") goodCombos.push(item);
    else if(!separate){ /* 한 제품 안 배합은 안내 생략 */ }
    else if(rule.type==="bad"){ if(sameTime) badCombos.push(item); else cautions.push(item); }
    else cautions.push(item);
  });
  return {rows, overs, goodCombos, badCombos, cautions};
}

  const {rows, badCombos, cautions, goodCombos} = analyze();
  let html = "";

  cautions.forEach(c=> html += `<div class="alert amber"><b>💡 ${c.aName} + ${c.bName}</b>${esc(c.rule.msg)}</div>`);
  goodCombos.forEach(c=> html += `<div class="alert green"><b>✅ ${c.aName} + ${c.bName}</b>${esc(c.rule.msg)}</div>`);
  if(badCombos.length+cautions.length===0 && rows.every(r=>r.status==="ok")){
    html = `<div class="alert green"><b>✅ 좋아요!</b>등록하신 영양제들의 함량과 조합에서 특별한 문제를 찾지 못했어요.</div>` + html;

  if(rows.length===0) html += `<div class="muted">성분 함량이 입력된 영양제가 없어요. [영양제] 탭에서 성분을 입력해 보세요.</div>`;

    const denom = r.ul || r.rda*3; // 상한 없으면 권장량 3배를 눈금 최대로
    const pct = Math.min(100, r.total/denom*100);
    const tag = r.status==="over" ? `<span class="tag over">상한 초과</span>`
              : r.status==="warn" ? `<span class="tag warn">상한 근접</span>`

    html += `<div class="nut-row">
      <div class="top"><span>${esc(r.name)}${r.ul?tag:""}</span>

      ${r.tip?`<div class="muted" style="font-size:11.5px;margin-top:2px">${esc(r.tip)}</div>`:""}

  return html;
}

function dayStats(dk){
  const doses = dosesForDay(); // 현재 등록 기준
  if(doses.length===0) return null;
  const rec = state.records[dk]||{};
  const done = doses.filter(d=> rec[d.suppId+"@"+d.time]).length;
  return {done, total:doses.length};
}
function moveMonth(delta){ calCursor.setMonth(calCursor.getMonth()+delta); render(); }
function selectDay(dk){ calSelected = dk; render(); }
function viewCalendar(){
  const y = calCursor.getFullYear(), m = calCursor.getMonth();
  const first = new Date(y,m,1), startWd = first.getDay(), days = new Date(y,m+1,0).getDate();
  const tk = todayKey();
  let html = `<div class="card">
  <div class="cal-head">
    <button onclick="moveMonth(-1)">‹</button><b>${y}년 ${m+1}월</b><button onclick="moveMonth(1)">›</button>
  </div>
  <div class="cal-grid">`;
  ["일","월","화","수","목","금","토"].forEach(w=> html += `<div class="wd">${w}</div>`);
  for(let i=0;i<startWd;i++) html += `<div></div>`;
  for(let d=1; d<=days; d++){
    const dk = dateKey(new Date(y,m,d));
    const st = dk<=tk ? dayStats(dk) : null;
    let dot = "";
    if(st && st.total>0){
      const color = st.done===st.total ? "var(--green)" : st.done>0 ? "var(--amber)" : "#d1d5db";
      dot = `<span class="dot" style="background:${color}"></span>`;
    }
    html += `<div class="cal-cell ${dk===tk?"today":""} ${dk===calSelected?"sel":""}" onclick="selectDay('${dk}')">${d}${dot}</div>`;
  }
  html += `</div>
  <div class="legend"><span><i style="background:var(--green)"></i>모두 복용</span>
  <span><i style="background:var(--amber)"></i>일부 복용</span>
  <span><i style="background:#d1d5db"></i>복용 안 함</span></div></div>`;

  // 선택한 날 상세
  const st = dayStats(calSelected);
  const selDate = new Date(calSelected+"T00:00:00");
  html += `<div class="card"><h2>${selDate.getMonth()+1}월 ${selDate.getDate()}일 기록</h2>`;
  if(!st || calSelected>tk){ html += `<div class="muted">기록이 없어요.</div>`; }
  else{
    const rec = state.records[calSelected]||{};
    dosesForDay().forEach(d=>{
      const ok = !!rec[d.suppId+"@"+d.time];
      html += `<div class="dose ${ok?"done":""}">
        <span class="time-badge">${d.time}</span>
        <span class="name">${esc(d.name)}</span>
        <span style="font-size:18px">${ok?"✅":"➖"}</span></div>`;
    });
    html += `<div class="muted" style="margin-top:8px">${st.done} / ${st.total}회 복용</div>`;
  }
  html += `</div>`;
  return html;
}

/* ---- 캘린더(.ics) 알람 파일 ---- */
function exportICS(){
  if(state.supps.length===0){ alert("먼저 [영양제] 탭에서 영양제를 등록해 주세요."); return; }
  const pad = n => String(n).padStart(2,"0");
  const now = new Date();
  const stamp = now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"T"+pad(now.getHours())+pad(now.getMinutes())+"00";
  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//NutriAlarm//KO\r\nCALSCALE:GREGORIAN\r\n";
  state.supps.forEach(s=> s.times.forEach(t=>{
    const [hh,mm] = t.split(":");
    const dtstart = now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"T"+hh+mm+"00";
    ics += "BEGIN:VEVENT\r\n"
      + "UID:"+s.id+"-"+t.replace(":","")+"@nutrialarm\r\n"
      + "DTSTAMP:"+stamp+"\r\n"
      + "DTSTART:"+dtstart+"\r\n"
      + "RRULE:FREQ=DAILY\r\n"
      + "SUMMARY:💊 "+s.name.replace(/[,;\\]/g," ")+" 드실 시간이에요\r\n"
      + "BEGIN:VALARM\r\nACTION:DISPLAY\r\nDESCRIPTION:영양제 알람\r\nTRIGGER:PT0M\r\nEND:VALARM\r\n"
      + "END:VEVENT\r\n";
  }));
  ics += "END:VCALENDAR\r\n";
  downloadFile("영양제알람.ics", ics, "text/calendar");
}
function exportData(){
  downloadFile("영양제알람_백업_"+todayKey()+".json", JSON.stringify(state,null,2), "application/json");
}
function importData(input){
  const f = input.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data.supps)) throw new Error();
      if(!confirm("백업을 불러오면 현재 데이터를 덮어써요. 계속할까요?")) return;
      state = data; save(); render(); alert("불러오기 완료!");
    }catch(e){ alert("백업 파일이 아니거나 손상된 파일이에요."); }
  };
  reader.readAsText(f);
  input.value = "";
}
function resetAll(){
  if(!confirm("정말 모든 영양제와 기록을 지울까요? 되돌릴 수 없어요.")) return;
  state = {supps:[], records:{}}; save(); render();
}
function downloadFile(name, content, type){
  const blob = new Blob(["﻿"+content], {type: type+";charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
}

/* ================= 라벨 사진 자동 인식 (OCR) =================
   사진 속 글자를 휴대폰 안에서 직접 읽어요. 서버로 전송하지 않아요. */
const OCR_ALIASES = [ // 긴 이름을 먼저 검사 (B12가 B1로 잘못 잡히지 않도록). 한국어·영어 라벨 모두 지원
  {key:"b12",        re:/(비타민|vitamin)\s*B\s*12|\bB12\b|cobalamin/i},
  {key:"b1",         re:/(비타민|vitamin)\s*B\s*1(?![0-9])|티아민|thiamin/i},
  {key:"b2",         re:/(비타민|vitamin)\s*B\s*2(?![0-9])|리보플라빈|riboflavin/i},
  {key:"b6",         re:/(비타민|vitamin)\s*B\s*6|\bB6\b|pyridoxine/i},
  {key:"vitA",       re:/(비타민|vitamin)\s*A(?![a-z0-9])/i},
  {key:"vitD",       re:/(비타민|vitamin)\s*[D0O]\s*3?(?=[\s\d(]|$)|cholecalcifero|D\s*3(?=\s*[\d(])/i},
  {key:"vitE",       re:/(비타민|vitamin)\s*E(?![a-z0-9])|tocopherol\s*(?=[\d(])/i},
  {key:"vitK",       re:/(비타민|vitamin)\s*K\s*[12]?(?![a-z0-9])/i},
  {key:"vitC",       re:/(비타민|vitamin)\s*[Cㅇ](?=[\s\d(]|$)|ascorbic/i},
  {key:"niacin",     re:/니아신|나이아신|niacin/i},
  {key:"folate",     re:/엽산|folate|folic/i},
  {key:"biotin",     re:/비오틴|biotin/i},
  {key:"pantothenic",re:/판토텐산|pantothenic/i},
  {key:"calcium",    re:/칼슘|calcium/i},
  {key:"magnesium",  re:/마그네[슘슈숨]|magnesium/i},
  {key:"iron",       re:/철(?:분)?\s*(?=[\d(])|\biron\b/i},
  {key:"zinc",       re:/아연|zinc/i},
  {key:"copper",     re:/구리|copper/i},
  {key:"selenium",   re:/셀레늄|셀렌|selenium/i},
  {key:"omega3",     re:/EPA|DHA|오메가|omega|cos[oa]penta|cosahex/i}, /* cos*: EPA·DHA 학명이 흐릿하게 읽힌 형태 */
  {key:"lutein",     re:/루테인|lutein/i},
  {key:"coq10",      re:/코엔자임|코큐텐|coq\s*10|coenzyme/i},
  {key:"milkthistle",re:/실리마린|밀크씨슬|밀크시슬|silymarin|milk\s*thistle/i},
  {key:"probiotics", re:/유산균|프로바이오틱스|probiotic|lactobacillus/i},
];
const OCR_NUM = /([\d][\d,]*(?:\.\d+)?)\s*(㎎|mg|밀리그램|㎍|ug|µg|μg|pg|yg|mcg|meq|mcq|마이크로그램|IU|억)/i;
/* pg·yg·meq·mcq = 사진에서 ㎍(µg)·mcg가 잘못 읽힌 흔한 형태 */
function ocrToUnit(key, val, unit){
  // 라벨의 단위를 이 앱이 쓰는 단위(㎎/㎍/억)로 변환
  const target = NUTRIENTS[key].unit;
  const u = unit.toLowerCase();
  let mg = null;
  if(u==="㎎"||u==="mg"||u==="밀리그램") mg = val;
  else if(u==="㎍"||u==="ug"||u==="µg"||u==="μg"||u==="pg"||u==="yg"||u==="mcg"||u==="meq"||u==="mcq"||u==="마이크로그램") mg = val/1000;
  else if(u==="iu"){
    if(key==="vitD") mg = (val/40)/1000;        // 40IU = 1㎍
    else if(key==="vitE") mg = val*0.67;         // 1IU ≈ 0.67㎎
    else if(key==="vitA") mg = (val*0.3)/1000;   // 1IU ≈ 0.3㎍
    else return null;
  }
  else if(u==="억") return key==="probiotics" ? val : null;
  if(mg===null) return null;
  const out = target==="㎎" ? mg : target==="㎍" ? mg*1000 : null;
  return out===null ? null : Math.round(out*100)/100;
}
function parseNutritionText(text){
  const found = {};
  let epaDhaSum = 0, omegaTotal = 0;
  const dejoin = s => s.replace(/(\d)\s+(?=\d)/g, "$1"); // "1 50mg"처럼 띄어 읽힌 숫자 붙이기
  text.split(/\n+/).forEach(line=>{
    OCR_ALIASES.forEach(a=>{
      const m = line.match(a.re);
      if(!m) return;
      const rest = dejoin(line.slice(m.index + m[0].length));
      const num = rest.match(OCR_NUM) || dejoin(line).match(OCR_NUM);
      if(!num) return;
      const val = parseFloat(num[1].replace(/,/g,""));
      if(!(val>0)) return;
      const conv = ocrToUnit(a.key, val, num[2]);
      if(conv===null || conv<=0) return;
      // 숫자를 잘못 읽은 것으로 보이는 터무니없는 값은 버림 (상한의 8배 초과)
      const n = NUTRIENTS[a.key];
      if(n.ul && conv > n.ul*8) return;
      if(a.key==="omega3"){
        // "Total Omega-3" 합계 줄과 EPA·DHA 개별 줄이 같이 있으면 중복으로 더하지 않음
        if(/EPA|DHA|cos[oa]penta|cosahex/i.test(line) && !/omega|오메가/i.test(line)) epaDhaSum += conv;
        else omegaTotal = Math.max(omegaTotal, conv);
      }
      else if(found[a.key]===undefined) found[a.key] = conv;
    });
  });
  const omega = epaDhaSum > 0 ? epaDhaSum : omegaTotal; // EPA+DHA 합이 식약처 기준이라 우선
  if(omega > 0) found.omega3 = omega;
  return Object.entries(found).map(([key,amount])=>({key,amount}));
}
function ocrSetStatus(t){ const el = document.getElementById("ocrStatus"); if(el) el.innerHTML = t; }
function ocrLoadImage(file){
  return new Promise((res,rej)=>{
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>res(img); img.onerror = rej; img.src = url;
  });
}
function ocrDownscale(img, max){
  const sc = Math.min(1, max/Math.max(img.width, img.height));
  const c = document.createElement("canvas");
  c.width = Math.round(img.width*sc); c.height = Math.round(img.height*sc);
  c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
  return c;
}
/* 사진 보정: 흑백 변환 + 명암 강화. invert=true면 검은 바탕 라벨용으로 색 반전 */
function ocrPreprocess(canvas, invert){
  const g = canvas.getContext("2d");
  const d = g.getImageData(0, 0, canvas.width, canvas.height);
  const p = d.data, n = p.length/4;
  const lum = new Uint8Array(n), hist = new Uint32Array(256);
  for(let i=0;i<n;i++){
    const l = (p[i*4]*0.299 + p[i*4+1]*0.587 + p[i*4+2]*0.114)|0;
    lum[i] = l; hist[l]++;
  }
  let lo=0, hi=255, acc=0;
  for(let i=0;i<256;i++){ acc+=hist[i]; if(acc>=n*0.05){ lo=i; break; } }
  acc=0;
  for(let i=255;i>=0;i--){ acc+=hist[i]; if(acc>=n*0.05){ hi=i; break; } }
  const range = Math.max(1, hi-lo);
  for(let i=0;i<n;i++){
    let v = Math.round((lum[i]-lo)*255/range);
    v = v<0?0 : v>255?255 : v;
    if(invert) v = 255-v;
    p[i*4] = p[i*4+1] = p[i*4+2] = v;
  }
  g.putImageData(d, 0, 0);
  return canvas;
}
/* 선택 영역을 잘라내 인식하기 좋은 크기로 확대 */
function extractRegion(img, r){
  const sc = Math.min(3, 1800/Math.max(r.w, r.h));
  const c = document.createElement("canvas");
  c.width = Math.max(1, Math.round(r.w*sc)); c.height = Math.max(1, Math.round(r.h*sc));
  const g = c.getContext("2d");
  g.imageSmoothingEnabled = true; g.imageSmoothingQuality = "high";
  g.drawImage(img, r.x, r.y, r.w, r.h, 0, 0, c.width, c.height);
  return c;
}
/* 어두운 라벨(검은 통에 흰 글씨)인지 자동 판단 */
function isDarkCanvas(c){
  const d = c.getContext("2d").getImageData(0, 0, c.width, c.height).data;
  const n = d.length/4, step = Math.max(1, Math.floor(n/20000));
  let sum = 0, cnt = 0;
  for(let i=0; i<n; i+=step){ sum += d[i*4]*0.299 + d[i*4+1]*0.587 + d[i*4+2]*0.114; cnt++; }
  return (sum/cnt) < 115;
}
/* 기울어진 사진 대비: 각도를 바꿔 다시 그리기 */
function rotateCanvas(base, deg){
  const c = document.createElement("canvas");
  c.width = base.width; c.height = base.height;
  const g = c.getContext("2d");
  g.fillStyle = "#808080"; g.fillRect(0, 0, c.width, c.height);
  g.translate(c.width/2, c.height/2); g.rotate(deg*Math.PI/180);
  g.drawImage(base, -base.width/2, -base.height/2);
  return c;
}
/* 어두우면 반전 → 읽기 방식 2가지 × 여러 각도로 읽어서 결과를 합침.
   주의: 인식기 하나에서 setParameters로 방식을 바꾸면 인식이 망가지는 버그가 있어
   방식별로 인식기를 따로 만들어 사용한다. */
async function ocrRecognizeCanvas(base, statusFn){
  await loadTesseract();
  const logger = m=>{ if(m.status==="recognizing text" && statusFn) statusFn(Math.round(m.progress*100)); };
  const wAuto = await Tesseract.createWorker("kor+eng", 1, {logger}); // 기본(자동) 방식
  const wCol  = await Tesseract.createWorker("kor+eng", 1, {logger}); // 단(표) 방식
  await wCol.setParameters({tessedit_pageseg_mode: "4"});
  const dark = isDarkCanvas(base);
  const merged = {};
  const passes = [[wAuto,0],[wCol,0],[wCol,-10],[wAuto,-10],[wCol,10],[wAuto,10],[wCol,-20],[wAuto,-20],[wCol,20],[wAuto,20]];
  let tries = 0, noNewStreak = 0;
  try{
    for(const [worker, ang] of passes){
      tries++;
      if(tries>1) ocrSetStatus("방식을 바꿔 다시 읽는 중… ("+tries+"/"+passes.length+")");
      const c = ocrPreprocess(rotateCanvas(base, ang), dark);
      const {data} = await worker.recognize(c);
      const f = parseNutritionText(data.text||"");
      let added = 0;
      f.forEach(x=>{
        if(x.key==="omega3"){ // 각도별로 EPA·DHA가 부분만 읽힐 수 있어 가장 큰 값 채택
          if(x.amount > (merged.omega3||0)){ if(merged.omega3===undefined) added++; merged.omega3 = x.amount; }
        }
        else if(merged[x.key]===undefined){ merged[x.key] = x.amount; added++; }
      });
      noNewStreak = added===0 ? noNewStreak+1 : 0;
      if(Object.keys(merged).length>=1 && noNewStreak>=2) break; // 찾은 뒤 두 번 연속 새 성분이 없으면 종료
    }
  }finally{ await wAuto.terminate(); await wCol.terminate(); }
  return Object.entries(merged).map(([key,amount])=>({key,amount}));
}
/* ---- 성분 표 영역 선택 화면 ---- */
let cropState = null;
function openCrop(img){
  cropState = {img, rect:null, scale:1};
  const ov = document.getElementById("cropOverlay");
  ov.style.display = "flex";
  const canvas = document.getElementById("cropCanvas");
  const maxW = Math.min(window.innerWidth-28, 600);
  const maxH = window.innerHeight*0.58;
  const sc = Math.min(maxW/img.width, maxH/img.height);
  canvas.width = Math.round(img.width*sc); canvas.height = Math.round(img.height*sc);
  cropState.scale = sc;
  drawCrop();
}
function drawCrop(){
  const c = document.getElementById("cropCanvas"), g = c.getContext("2d");
  g.drawImage(cropState.img, 0, 0, c.width, c.height);
  const r = cropState.rect;
  if(r && r.w>2 && r.h>2){
    g.fillStyle = "rgba(0,0,0,.55)";
    g.fillRect(0, 0, c.width, r.y);
    g.fillRect(0, r.y+r.h, c.width, c.height-r.y-r.h);
    g.fillRect(0, r.y, r.x, r.h);
    g.fillRect(r.x+r.w, r.y, c.width-r.x-r.w, r.h);
    g.strokeStyle = "#2dd4bf"; g.lineWidth = 3;
    g.strokeRect(r.x, r.y, r.w, r.h);
  }
}
(function(){
  const c = document.getElementById("cropCanvas");
  let dragging = false, sx = 0, sy = 0;
  const pos = e => {
    const b = c.getBoundingClientRect();
    return {x:(e.clientX-b.left)*c.width/b.width, y:(e.clientY-b.top)*c.height/b.height};
  };
  c.addEventListener("pointerdown", e=>{
    if(!cropState) return;
    dragging = true; const p = pos(e); sx = p.x; sy = p.y;
    cropState.rect = {x:sx, y:sy, w:0, h:0};
    try{ c.setPointerCapture(e.pointerId); }catch(_){}
    e.preventDefault();
  });
  c.addEventListener("pointermove", e=>{
    if(!dragging || !cropState) return;
    const p = pos(e);
    cropState.rect = {x:Math.min(sx,p.x), y:Math.min(sy,p.y), w:Math.abs(p.x-sx), h:Math.abs(p.y-sy)};
    drawCrop();
    e.preventDefault();
  });
  c.addEventListener("pointerup", ()=>{ dragging = false; });
})();
function closeCrop(){
  document.getElementById("cropOverlay").style.display = "none";
  cropState = null;
}
async function cropConfirm(whole){
  if(!cropState) return;
  const img = cropState.img, s = cropState.scale, sel = cropState.rect;
  let r;
  if(whole || !sel || sel.w<15 || sel.h<15) r = {x:0, y:0, w:img.width, h:img.height};
  else r = {x:sel.x/s, y:sel.y/s, w:sel.w/s, h:sel.h/s};
  closeCrop();
  try{
    ocrSetStatus("글자 인식 도구 준비 중… (처음 한 번만 오래 걸려요)");
    const base = extractRegion(img, r);
    const found = await ocrRecognizeCanvas(base, pct=>ocrSetStatus("글자를 읽는 중… "+pct+"%"));
    if(found.length===0){
      ocrSetStatus("⚠️ 성분을 찾지 못했어요. <b>성분 표만 꽉 차게 선택</b>했는지, 사진이 밝고 선명한지 확인하고 다시 시도해 보세요.");
      return;
    }
    persistName();
    found.forEach(f=>{
      const i = formIngs.findIndex(x=>x.key===f.key);
      if(i>=0) formIngs[i].amount = f.amount; else formIngs.push(f);
    });
    render();
    setTimeout(()=>ocrSetStatus("✅ <b>"+found.length+"개 성분을 읽었어요!</b> 아래 숫자가 라벨과 같은지 꼭 확인해 주세요."), 0);
  }catch(e){
    ocrSetStatus("⚠️ 사진을 읽지 못했어요. 인터넷 연결을 확인한 뒤 다시 시도해 주세요.");
  }
}
let tessLoading = null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  if(!tessLoading) tessLoading = new Promise((res,rej)=>{
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload = res; s.onerror = ()=>{ tessLoading=null; rej(new Error("network")); };
    document.head.appendChild(s);
  });
  return tessLoading;
}
async function ocrPhoto(input){
  const file = input.files[0]; input.value = "";
  if(!file) return;
  try{
    const img = await ocrLoadImage(file);
    openCrop(img); // 성분 표 부분을 선택하는 화면 열기 → cropConfirm()에서 인식 진행
  }catch(e){ ocrSetStatus("⚠️ 사진을 열지 못했어요. 다른 사진으로 시도해 보세요."); }
}

/* ================= 앱이 열려 있는 동안 울리는 알람 ================= */
let lastAlerted = "";
function checkAlarm(){
  const now = new Date();
  const hhmm = String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  if(lastAlerted === hhmm) return;
  const dk = todayKey();
  const due = dosesForDay().filter(d=> d.time===hhmm && !isChecked(dk,d.suppId,d.time));
  if(due.length===0) return;
  lastAlerted = hhmm;
  const names = due.map(d=>d.name).join(", ");
  showBanner("💊 영양제 드실 시간이에요!", names);
  beep();
  if(navigator.vibrate) navigator.vibrate([300,150,300]);
  if("Notification" in window && Notification.permission==="granted"){
    try{ new Notification("💊 영양제 드실 시간이에요!", {body:names}); }catch(e){}
  }
  if(tab==="today") render();
}
function showBanner(title, body){
  const b = document.getElementById("alarmBanner");
  b.innerHTML = `<b>${esc(title)}</b>${esc(body)}<div class="small" style="opacity:.85;margin-top:4px">누르면 닫혀요</div>`;
  b.style.display = "block";
  setTimeout(hideBanner, 60000);
}
function hideBanner(){ document.getElementById("alarmBanner").style.display = "none"; }
function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach(t0=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; o.type = "sine";
      g.gain.setValueAtTime(0.001, ctx.currentTime+t0);
      g.gain.exponentialRampToValueAtTime(0.35, ctx.currentTime+t0+0.03);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t0+0.25);
      o.start(ctx.currentTime+t0); o.stop(ctx.currentTime+t0+0.3);
    });
  }catch(e){}
}
setInterval(checkAlarm, 15000);

/* ================= 시작 ================= */
load();
render();
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
